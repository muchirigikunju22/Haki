services:
  - type: web
    name: haki-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PGVECTOR_CONNECTION_STRING
        sync: false
    autoDeploy: true
